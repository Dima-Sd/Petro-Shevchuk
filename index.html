<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, width=device-width" />
  <title>Praga 38</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Josefin Sans:wght@400&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant Infant:wght@400&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="stylesheet" href="./reset.css" />
  <link rel="stylesheet" href="./global.css" />
  <link rel="stylesheet" href="./index.css" />
</head>

<body>
  <header class="site-header">
    <div class="site-header__bar">
      <div class="site-header__inner">
        <address class="site-header__contact">
          <a class="site-header__button site-header__button--phone" href="tel:+48511333960">
            Tel- +48 511 333 960
          </a>
        </address>
        <a class="site-header__logo-link" href="./index.html" aria-label="Praga 38 - strona glowna">
          <img class="site-header__logo" src="./public/Ellipse-1@2x.png" alt="Praga 38 Restauracja" width="250"
            height="250" />
        </a>
        <a class="site-header__button site-header__button--reservation" href="#reservation">
          Rezerwacja
        </a>
      </div>
    </div>
    <div class="site-header__divider" aria-hidden="true"></div>
  </header>

  <main class="main">
    <section class="reviews">
      <div class="container">
        <div class="reviews__inner">
          <h2 class="reviews__eyebrow">Recenzje</h2>
          <h3 class="reviews__heading">nasi klienci mówią</h3>
          <p class="reviews__lead">
            Zawsze chętnie słuchamy opinii klientów, dlatego prosimy o
            pozostawienie komentarza lub przywitanie się z nami za
            pośrednictwem poczty e-mail.
          </p>

          <div class="swiper reviews__swiper">
            <div class="swiper-wrapper" id="reviewsWrapper">
              <!-- слайди генеруються JS з reviews.json -->
            </div>
            <div class="swiper-pagination"></div>
          </div>

          <p class="reviews__empty is-hidden" id="reviewsEmpty">
            Recenzje chwilowo niedostępne.
          </p>
        </div>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="./slider.js"></script>
</body>

</html>
