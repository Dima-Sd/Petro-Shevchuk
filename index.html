<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, width=device-width" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Josefin Sans:wght@400&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant Infant:wght@400&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="stylesheet" href="./reset.css" />
  <link rel="stylesheet" href="./global.css" />
  <link rel="stylesheet" href="./index.css" />
</head>

<body>
  <main class="main">
    <section class="reviews">
      <div class="container">
        <div class="reviews__inner">
          <h2 class="reviews__eyebrow">Recenzje</h2>
          <h3 class="reviews__heading">nasi klienci mówią</h3>
          <p class="reviews__lead">
            Zawsze chętnie słuchamy opinii klientów, dlatego prosimy o
            pozostawienie komentarza lub przywitanie się z nami za
            pośrednictwem poczty e-mail.
          </p>

          <div class="swiper reviews__swiper">
            <div class="swiper-wrapper" id="reviewsWrapper">
              <!-- слайди генеруються JS з reviews.json -->
            </div>
            <div class="swiper-pagination"></div>
          </div>

          <p class="reviews__empty is-hidden" id="reviewsEmpty">
            Recenzje chwilowo niedostępne.
          </p>
        </div>
      </div>
    </section>

    <!-- Форма -->
     
    <section class="rezervaja" id="reservation" style="background-image: url('./dist/IMAGE@2x.e60be271.png');">
      <div class="container">
        <div class="reservation-container" id="reservation">
    
          <header class="reservation-header">
            <span class="reservation-eyebrow">Rezerwacja</span>
            <h2 class="reservation-title">Zarezerwuj stolik</h2>
          </header>
    
          <form class="reservation-form" id="reservationForm">
            <div class="reservation-row">
              <div class="reservation-field input-box">
                <label class="visually-hidden" for="res-name">Imię i nazwisko</label>
                <input id="res-name" name="name" type="text" placeholder="Imię i nazwisko" required />
                <span class="error-message"></span>
              </div>
              <div class="reservation-field input-box">
                <label class="visually-hidden" for="res-phone">Telefon</label>
                <input id="res-phone" name="phone" type="tel" placeholder="Telefon" required />
                <span class="error-message"></span>
              </div>
            </div>
    
            <div class="reservation-row reservation-row--three">
              <div class="reservation-field input-box">
                <label class="visually-hidden" for="res-guests">Osoby</label>
                <input id="res-guests" name="guests" type="number" min="1" max="20" placeholder="Osoby" required />
                <span class="error-message"></span>
              </div>
              <div class="reservation-field input-box">
                <label class="visually-hidden" for="res-time">Czas</label>
                <input id="res-time" name="time" type="text" inputmode="numeric" placeholder="Czas (GG:MM)" required />
                <span class="error-message"></span>
              </div>
              <div class="reservation-field input-box">
                <label class="visually-hidden" for="res-date">Data</label>
                <input id="res-date" name="date" type="text" inputmode="numeric" placeholder="Data (DD.MM.RRRR)" required />
                <span class="error-message"></span>
              </div>
            </div>
    
            <button type="submit" class="reservation-submit" id="sendBtn">Zarezerwuj stolik</button>
            <p id="formStatus" class="reservation-status"></p>
          </form>
    
        </div>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="./slider.js"></script>
  <script src="./reservation.js"></script>
</body>

</html>
